# Aegis-AD CI/CD pipeline
# ----------------------------------------------------------------------------
# Three independent jobs guard every push/PR to `main`:
#   1. lint                  — ruff (style + format) on the package, tests, main
#   2. conventional-commits  — Conventional Commits enforcement on PRs
#   3. test                  — pytest + coverage on a Python 3.10 / 3.11 matrix
# Pip wheels are cached by `actions/setup-python` keyed on `requirements.txt`,
# so repeat runs avoid the heavy torch / catboost / lightgbm download.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep CI minutes lean.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # --------------------------------------------------------------------------
  # 1. Static analysis — fail-fast PEP-8 / import-order / format check
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff==0.6.9

      - name: Ruff — lint
        run: ruff check aegis_ad tests main.py

      - name: Ruff — format check
        run: ruff format --check aegis_ad tests main.py

  # --------------------------------------------------------------------------
  # 2. Conventional Commits — enforce semantic history on every PR
  # --------------------------------------------------------------------------
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: webiny/action-conventional-commits@v1.3.0

  # --------------------------------------------------------------------------
  # 3. Tests + coverage — Python matrix
  # --------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pytest==8.* pytest-cov==5.* pytest-xdist==3.*

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=aegis_ad \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --maxfail=1 \
            -v

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Publish coverage to Codecov
        if: matrix.python-version == '3.11' && github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
